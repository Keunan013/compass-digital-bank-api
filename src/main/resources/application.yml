spring:
  application:
    name: digital-bank-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/digital_bank}
    username: ${DB_USERNAME:digital_bank}
    password: ${DB_PASSWORD:digital_bank}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: ${JWT_SECRET:local-development-secret-please-change-me-with-at-least-32-bytes}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
      issuer: ${JWT_ISSUER:digital-bank-api}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    capacity: ${RATE_LIMIT_CAPACITY:60}
    refill-tokens: ${RATE_LIMIT_REFILL_TOKENS:60}
    refill-period-seconds: ${RATE_LIMIT_REFILL_PERIOD_SECONDS:60}
  seed:
    enabled: ${SEED_ENABLED:true}
    default-password: ${SEED_DEFAULT_PASSWORD:Password123!}
  messaging:
    enabled: ${MESSAGING_ENABLED:true}

logging:
  level:
    com.compass.digitalbank: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: INFO
